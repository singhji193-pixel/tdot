<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="shoe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sole-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shoe body -->
  <path d="M150,200 Q200,120 350,130 Q450,135 520,160 Q600,190 680,220 Q720,235 720,270 Q720,310 680,330 L150,330 Q120,330 120,300 L120,240 Q120,210 150,200Z" fill="url(#shoe-grad)"/>
  <!-- Sole -->
  <path d="M120,300 Q120,330 150,340 L700,340 Q730,340 730,320 L730,290 Q730,270 700,270 L160,270 Q130,270 120,300Z" fill="url(#sole-grad)"/>
  <!-- Air unit -->
  <ellipse cx="620" cy="310" rx="80" ry="25" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Nike swoosh -->
  <path d="M250,240 Q350,200 500,210 Q550,213 520,225 Q400,260 300,270 Q270,273 250,240Z" fill="#fff" opacity="0.9"/>
  <!-- Laces -->
  <line x1="300" y1="160" x2="340" y2="180" stroke="#555" stroke-width="3"/>
  <line x1="330" y1="150" x2="370" y2="175" stroke="#555" stroke-width="3"/>
  <line x1="360" y1="145" x2="400" y2="170" stroke="#555" stroke-width="3"/>
  <!-- AIR text -->
  <text x="590" y="250" font-family="Arial" font-size="24" font-weight="bold" fill="#fff" opacity="0.3">AIR</text>
  <!-- 270 text -->
  <text x="580" y="205" font-family="Arial" font-size="18" font-weight="bold" fill="#fff" opacity="0.2">270</text>
</svg>
