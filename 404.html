<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | T-DOT Towing</title>
    <link rel="canonical" href="https://t-dottowing.ca/404.html">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;font-family:'Inter',sans-serif;background:#080808;color:#fff}
        a{text-decoration:none;color:inherit}
        .wrap{
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:40px 20px;
            text-align:center;
            background:linear-gradient(135deg,#0d0d0d,#1a0000,#0d0d0d);
        }
        .logo{height:48px;width:auto;margin-bottom:40px;opacity:0.85}
        .code{
            font-size:clamp(80px,15vw,140px);
            font-weight:800;
            letter-spacing:-4px;
            line-height:1;
            background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,0.3));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .title{
            font-size:clamp(20px,4vw,28px);
            font-weight:700;
            margin-top:16px;
            letter-spacing:-0.5px;
        }
        .sub{
            font-size:14px;
            color:rgba(255,255,255,0.45);
            margin-top:10px;
            font-weight:300;
            max-width:360px;
            line-height:1.6;
        }
        .links{
            display:flex;flex-wrap:wrap;gap:10px;
            justify-content:center;
            margin-top:36px;
        }
        .link-btn{
            padding:11px 22px;
            border-radius:25px;
            font-size:13px;font-weight:600;
            border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.06);
            color:rgba(255,255,255,0.75);
            transition:all 0.25s;
        }
        .link-btn:hover{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.25)}
        .link-btn.primary{background:#fff;color:#0d0d0d;border-color:#fff}
        .link-btn.primary:hover{background:#e0e0e0}
        .divider{
            width:40px;height:2px;
            background:rgba(255,255,255,0.08);
            border-radius:1px;
            margin:36px auto 0;
        }
        .phone{
            margin-top:20px;
            font-size:13px;
            color:rgba(255,255,255,0.35);
        }
        .phone a{color:rgba(255,255,255,0.65);transition:color 0.2s}
        .phone a:hover{color:#fff}
    </style>
</head>
<body>
    <div class="wrap">
        <img src="assets/images/logo.png" alt="T-DOT Towing" class="logo">
        <div class="code">404</div>
        <h1 class="title">Page Not Found</h1>
        <p class="sub">The page you're looking for doesn't exist or has been moved.</p>
        <div class="links">
            <a href="index.html" class="link-btn primary">Go Home</a>
            <a href="services.html" class="link-btn">Our Services</a>
            <a href="contact.html" class="link-btn">Contact Us</a>
            <a href="faq.html" class="link-btn">FAQ</a>
        </div>
        <div class="divider"></div>
        <p class="phone">Need a tow right now? Call <a href="tel:6472237094">(647) 223-7094</a> — available 24/7</p>
    </div>
</body>
</html>
